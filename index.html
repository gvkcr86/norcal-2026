<!DOCTYPE html>
<html class="staticrypt-html" lang="en">
    <head>
        <meta charset="utf-8" />
        <title>USA · NorCal Holiday 2026</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="theme-color" content="#0a4775" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root{
                --ocean:#0a4775; --blue:#1a73b8; --sky:#5fb0e5; --ink:#0d3b66;
                --sun-a:#ffd56b; --sun-b:#ffae3c;
            }
            *{box-sizing:border-box}
            .staticrypt-html{height:100%}
            .staticrypt-body{
                height:100%; margin:0;
                font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
                -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
                background:#0a4775;
            }
            .staticrypt-content{
                position:relative; height:100%; min-height:100dvh; overflow:hidden;
                background:linear-gradient(180deg,#073a63 0%,#0e5a96 42%,#2f8fcf 78%,#7cc4ee 100%);
            }
            /* ---- decorative holiday sky ---- */
            .sky-sun{
                position:absolute; top:-70px; right:-70px; width:260px; height:260px; border-radius:50%;
                background:radial-gradient(circle at 50% 50%,var(--sun-a) 0%,var(--sun-b) 42%,rgba(255,174,60,0) 70%);
                opacity:.9; pointer-events:none;
            }
            .cloud{
                position:absolute; background:#fff; border-radius:100px; opacity:.85;
                filter:blur(.3px); pointer-events:none;
            }
            .cloud::before,.cloud::after{content:"";position:absolute;background:#fff;border-radius:50%}
            .cloud.c1{width:120px;height:34px;top:16%;left:10%;animation:drift 26s linear infinite}
            .cloud.c1::before{width:50px;height:50px;top:-22px;left:18px}
            .cloud.c1::after{width:38px;height:38px;top:-16px;left:62px}
            .cloud.c2{width:90px;height:26px;top:30%;right:14%;opacity:.7;animation:drift 34s linear infinite reverse}
            .cloud.c2::before{width:38px;height:38px;top:-16px;left:14px}
            .cloud.c2::after{width:30px;height:30px;top:-12px;left:48px}
            @keyframes drift{0%{transform:translateX(0)}50%{transform:translateX(26px)}100%{transform:translateX(0)}}
            /* ocean / beach band at the bottom */
            .sea{
                position:absolute; left:0; right:0; bottom:0; height:120px;
                background:linear-gradient(180deg,rgba(124,196,238,0) 0%,#9ad4f2 40%,#bfe6f7 100%);
                pointer-events:none;
            }
            .sea::before{
                content:""; position:absolute; left:-5%; right:-5%; top:-22px; height:44px;
                background:#9ad4f2; border-radius:50%;
            }

            /* ---- card ---- */
            .staticrypt-page{
                position:relative; z-index:2; min-height:100%;
                display:flex; align-items:center; justify-content:center; padding:24px;
            }
            .card{
                width:100%; max-width:392px; padding:34px 32px 26px; text-align:center;
                background:rgba(255,255,255,.94); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
                border:1px solid rgba(255,255,255,.6); border-radius:24px;
                box-shadow:0 24px 60px rgba(5,32,58,.40), 0 4px 14px rgba(5,32,58,.20);
            }
            .route{display:flex;align-items:center;justify-content:center;gap:8px;margin:2px 0 14px}
            .route .dot{width:9px;height:9px;border-radius:50%;background:var(--ocean);box-shadow:0 0 0 4px rgba(10,71,117,.12)}
            .route .line{width:96px;border-top:2px dashed #a9c6e2}
            .route .plane{font-size:24px;line-height:1;animation:float 3.4s ease-in-out infinite}
            @keyframes float{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-5px) rotate(-4deg)}}
            .title{margin:0;font-size:25px;font-weight:800;letter-spacing:-.4px;color:var(--ink)}
            .dates{margin:6px 0 2px;font-size:13.5px;font-weight:700;color:var(--blue);letter-spacing:.2px}
            .sub{margin:8px 0 0;font-size:14px;line-height:1.5;color:#5a6b7d}
            .rule{height:1px;background:linear-gradient(90deg,transparent,#dfe7ef,transparent);border:0;margin:20px 0}

            /* ---- form ---- */
            .staticrypt-password-container{position:relative;margin:0 0 14px}
            .card input[type="password"],
            .card input[type="text"]{
                width:100%; background:#f1f5f9; border:1.5px solid #dbe5ef; border-radius:12px;
                font-size:15px; color:var(--ink); outline:0; padding:15px 46px 15px 16px;
                transition:border-color .15s ease, box-shadow .15s ease;
            }
            .card input[type="password"]::placeholder,
            .card input[type="text"]::placeholder{color:#9aa9b8}
            .card input[type="password"]:focus,
            .card input[type="text"]:focus{
                border-color:var(--blue); box-shadow:0 0 0 4px rgba(26,115,184,.15); background:#fff;
            }
            .staticrypt-toggle-password-visibility{
                cursor:pointer; height:20px; width:20px; opacity:.55; padding:13px;
                position:absolute; right:2px; top:50%; transform:translateY(-50%);
            }
            label.staticrypt-remember{
                display:flex; align-items:center; justify-content:center; gap:9px;
                margin:0 0 16px; font-size:13px; color:#5a6b7d; cursor:pointer;
            }
            .staticrypt-remember input[type="checkbox"]{transform:scale(1.25);accent-color:var(--blue);cursor:pointer}
            .card .staticrypt-decrypt-button{
                width:100%; border:0; border-radius:12px; cursor:pointer; padding:15px;
                color:#fff; font-size:15px; font-weight:700; letter-spacing:.3px;
                background:linear-gradient(180deg,#2486c8 0%,#0e5a96 100%);
                box-shadow:0 8px 20px rgba(14,90,150,.35); transition:filter .15s ease, transform .05s ease;
            }
            .card .staticrypt-decrypt-button:hover{filter:brightness(1.06)}
            .card .staticrypt-decrypt-button:active{transform:translateY(1px)}
            .foot{margin:18px 0 2px;font-size:12.5px;color:#8a99a8}

            /* ---- loading spinner ---- */
            .staticrypt-spinner-container{height:100%;min-height:100dvh;display:flex;align-items:center;justify-content:center}
            .staticrypt-spinner{
                display:inline-block;width:2.2rem;height:2.2rem;border:.25em solid rgba(255,255,255,.5);
                border-right-color:transparent;border-radius:50%;animation:spinner-border .75s linear infinite;
            }
            @keyframes spinner-border{100%{transform:rotate(360deg)}}
            .hidden{display:none !important}

            @media screen and (-webkit-min-device-pixel-ratio:0){
                .card input[type="password"],
                .card input[type="text"]{font-size:16px}
            }
            @media (max-width:420px){ .card{padding:30px 22px 22px} .title{font-size:22px} }
        </style>
    </head>

    <body class="staticrypt-body">

            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">

            <div class="cloud c1"></div>

                            <input id="staticrypt-remember" type="checkbox" name="remember" />

                        <input type="submit" class="staticrypt-decrypt-button" value="Let's go ✈️" />
                    </form>

                    <p class="foot">Pack your bags — adventure awaits 🧳</p>
                </div>
            </div>
        </div>
